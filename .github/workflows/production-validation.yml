name: Production source and artifact validation

on:
  pull_request:
  push:
    branches:
      - main
      - features/dual-product-draft
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-regression:
    name: Mobile and server source regression
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out the immutable candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select the reviewed Node toolchain
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - name: Install exactly the reviewed dependency graphs
        run: |
          npm ci --ignore-scripts
          npm --prefix server ci --ignore-scripts
      - name: Run lint, compiler checks, tests, Doctor, and production exports
        run: npm run validate

  dependencies-and-sbom:
    name: Live dependency audit and SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the immutable candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select the reviewed Node toolchain
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - name: Install exactly the reviewed dependency graphs
        run: |
          npm ci --ignore-scripts
          npm --prefix server ci --ignore-scripts
      - name: Enforce immutable release policy and query current advisories
        run: npm run validate:production:release
      - name: Scan the built server image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: veryloving-clm:production-validation
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Retain SBOM evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-sboms-${{ github.sha }}
          path: release-artifacts/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 30
