name: Production source and artifact validation

on:
  pull_request:
  push:
    branches:
      - main
      - features/dual-product-draft
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies-and-sbom:
    name: Live dependency audit and SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the immutable candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select the reviewed Node toolchain
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - name: Install exactly the reviewed dependency graphs
        run: |
          npm ci --ignore-scripts
          npm --prefix server ci --ignore-scripts
      - name: Enforce immutable release policy and query current advisories
        run: npm run validate:production:release
      - name: Scan the built server image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: veryloving-clm:production-validation
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Retain SBOM evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-sboms-${{ github.sha }}
          path: release-artifacts/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 30
